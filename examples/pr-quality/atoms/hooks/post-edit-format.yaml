id: post-edit-format
name: Post Edit Format
events:
  generic:
    - after_edit
  claude-code:
    - PostToolUse
  codex:
    - PostToolUse
handler:
  kind: shell
  command: npm run format
permissions:
  - shell.execution
  - filesystem.write
risk_level: high
warnings:
  - "Runs a shell command after file edits. Review before enabling."
