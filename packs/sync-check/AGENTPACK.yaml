agentpack: "1.0"

metadata:
  id: "agentpack.sync-check"
  name: "AgentPack Sync Check"
  slug: "sync-check"
  description: "SessionStart nudge when installed AgentPacks have upstream updates. Read-only, offline-silent, never applies anything."
  version: "0.1.0"
  license: "MIT"
  publisher: "agentpack"
  authors:
    - name: "AgentPack"
      email: "hello@agentpack.dev"
  tags:
    - sync
    - update
    - notifier

compatibility:
  targets:
    claude-code:
      status: supported
      notes: "SessionStart hook + bundled script under .claude/hooks/. Works at project scope and --scope user."
    codex:
      status: unsupported
      notes: "Codex has no SessionStart lifecycle event; run `agentpack update --check` manually."
    cursor:
      status: unsupported
      notes: "Cursor executes no lifecycle hooks; run `agentpack update --check` manually."
    chatgpt:
      status: unsupported
      notes: "No hook surface."
    generic:
      status: unsupported
      notes: "The generic target documents hooks instead of executing them — no session lifecycle exists."

permissions:
  filesystem:
    read:
      - "."
  shell:
    execution: required
    commands:
      - "sh ${CLAUDE_PROJECT_DIR}/.claude/hooks/sync-check.sh"
  network:
    access: optional
    domains:
      - "api.github.com"
      - "raw.githubusercontent.com"
  package_installation: false
  user_data_access: false
  private_context_access: false
  model_provider_key_access: false

security:
  risk_level: high
  risk_summary: "Ships a shell hook (high risk by type). The hook is read-only by design: it runs `agentpack update --check --quiet` with a bounded timeout, prints at most one nudge line, and exits 0 on every failure path."
  requires_review: true
  signed: false

profiles:
  default:
    description: "The SessionStart nudge hook."
    include:
      - "*"

atoms:
  - id: "hook:sync-check"
    type: hook
    name: "Sync Check Nudge"
    description: "SessionStart hook that runs a read-only `agentpack update --check --quiet` and prints a one-line nudge when updates are available. Offline-silent: any failure exits 0 with no output."
    path: "atoms/hooks/sync-check.yaml"
    risk_level: high
    permissions:
      - shell.execution
      - network.access
    lifecycle:
      events:
        claude-code:
          - SessionStart

exports:
  default_profile: default
  output_dir: "dist"
  lockfile: "AGENTPACK.lock"

adapters:
  claude-code:
    enabled: true
    output:
      settings: ".claude/settings.json"
