agentpack: "1.0"

metadata:
  id: "agentpack.no-exec-fixture"
  name: "No Exec Fixture"
  slug: "no-exec-fixture"
  description: "Test fixture: a pack with only a non-executable instruction atom — the --allow-exec gate must never fire."
  version: "0.1.0"
  license: "MIT"
  publisher: "agentpack"
  authors:
    - name: "AgentPack"
      email: "hello@agentpack.dev"
  tags:
    - test

compatibility:
  targets:
    generic:
      status: supported
      notes: "Generates AGENTS.md and agentpack.json."

permissions:
  filesystem:
    read:
      - "."
  package_installation: false
  model_provider_key_access: false

security:
  risk_level: low
  risk_summary: "Low — instruction content only."
  requires_review: false
  signed: false

profiles:
  full:
    description: "Includes the instruction."
    include:
      - "*"

atoms:
  - id: "instruction:house-style"
    type: instruction
    name: "House Style"
    description: "A persistent instruction with no executable surface."
    path: "atoms/instructions/house-style.md"
    risk_level: low
    permissions: []

exports:
  default_profile: full
  output_dir: "dist"
  lockfile: "AGENTPACK.lock"

adapters:
  generic:
    enabled: true
    output:
      instructions: "AGENTS.md"
      skills: "skills"
      manifest: "agentpack.json"
      readme: "README-agent.md"
