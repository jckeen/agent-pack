# Codex configuration

model = "gpt-5.4"

[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
env = { GITHUB_TOKEN = "${GITHUB_TOKEN}" }
enabled_tools = ["get_pull_request", "list_pull_request_files"]
disabled_tools = ["create_comment"]

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/workspace"]
cwd = "/workspace"

[hooks]

[[hooks.PostToolUse]]
command = "npm run format"

[[hooks.SessionStart]]
command = "git status"
