name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: build · typecheck · lint · test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first — the CLI test suite subprocess-runs the compiled binary,
      # so dist/ must exist before the test step. Building also forces core
      # to emit type declarations the CLI and registry typechecks consume.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (with coverage)
        run: pnpm test:coverage

      - name: Smoke CLI (validate example pack)
        run: |
          node packages/cli/dist/index.js validate examples/pr-quality
          node packages/cli/dist/index.js plan examples/pr-quality \
            --target claude-code --profile safe
          node packages/cli/dist/index.js pack export examples/pr-quality \
            --target generic --profile safe --out /tmp/ci-smoke
          test -f /tmp/ci-smoke/AGENTS.md
          test -f /tmp/ci-smoke/skills/code-review/SKILL.md
          test -f /tmp/ci-smoke/agentpack.json

      - name: Determinism check (two consecutive exports byte-identical)
        run: |
          node packages/cli/dist/index.js pack export examples/pr-quality \
            --target claude-code --profile full --out /tmp/ci-determ-a
          node packages/cli/dist/index.js pack export examples/pr-quality \
            --target claude-code --profile full --out /tmp/ci-determ-b
          diff -r /tmp/ci-determ-a /tmp/ci-determ-b

      - name: Phase 2 smoke (install / verify / verify --chain / history / uninstall)
        run: |
          set -euo pipefail
          SMOKE="${RUNNER_TEMP:-/tmp}/agentpack-phase2-smoke"
          rm -rf "$SMOKE"
          mkdir -p "$SMOKE"
          node packages/cli/dist/index.js install examples/pr-quality \
            --target generic --profile safe --project "$SMOKE" --yes
          test -f "$SMOKE/AGENTPACK.lock"
          test -f "$SMOKE/.agentpack/installed/agentpack.pr-quality.json"
          test -f "$SMOKE/.agentpack/history.jsonl"
          node packages/cli/dist/index.js verify agentpack.pr-quality --project "$SMOKE"
          node packages/cli/dist/index.js verify agentpack.pr-quality --project "$SMOKE" --chain
          node packages/cli/dist/index.js history --project "$SMOKE" --limit 5
          node packages/cli/dist/index.js uninstall agentpack.pr-quality --project "$SMOKE" --yes
          test ! -e "$SMOKE/.agentpack/installed/agentpack.pr-quality.json"

      - name: Lockfile determinism (Phase 2)
        run: |
          set -euo pipefail
          A="${RUNNER_TEMP:-/tmp}/agentpack-lock-a"
          B="${RUNNER_TEMP:-/tmp}/agentpack-lock-b"
          rm -rf "$A" "$B"; mkdir -p "$A" "$B"
          node packages/cli/dist/index.js install examples/pr-quality \
            --target generic --profile safe --project "$A" --yes
          node packages/cli/dist/index.js install examples/pr-quality \
            --target generic --profile safe --project "$B" --yes
          diff "$A/AGENTPACK.lock" "$B/AGENTPACK.lock"
