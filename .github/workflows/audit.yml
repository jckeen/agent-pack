# Weekly dependency audit (#63): fail on high/critical advisories in
# production dependencies only. Scheduled workflows run from the default
# branch; also manually dispatchable for an on-demand check.

name: Audit

on:
  schedule:
    # Mondays 09:13 UTC — off the top of the hour to dodge scheduler load spikes.
    - cron: "13 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: pnpm audit (prod, high+)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      # No install needed — `pnpm audit` reads the lockfile.
      - name: Audit production dependencies (high/critical)
        run: pnpm audit --prod --audit-level=high
